    body{

    .main-wrapper{
      max-width:395px;
      margin:auto;
      padding:20px 15px 40px;
      text-align:center;
    }

    /* Badge */
    .trending-badge{
      display:inline-block;
      background:linear-gradient(90deg,#ff4fa0,#ff72b5);
      color:#fff;
      padding:8px 18px;
      border-radius:30px;
      font-size:13px;
      font-weight:600;
      box-shadow:0 5px 15px rgba(255,79,160,.35);
      margin-bottom:22px;
    }

    /* App Box */
    .app-icon-box{
      width:140px;
      height:140px;
      background:#fff;
      border-radius:25px;
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 8px 20px rgba(0,0,0,.06);
    }

    /* ADD THIS NEW CSS */

.app-logo{
  width:100%;

}

    /* Title */
    .title{
      color:#ecc836;
      font-weight:700;
      font-size:42px;
      margin-top:25px;
    }

    .subtitle{
      color:#fffcfc;
      font-size:16px;
      line-height:1.8;
      margin-top:10px;
    }

    /* DOWNLOAD BUTTON */
    .download-btn{
      position:relative;
      overflow:hidden;
      margin-top:28px;
      background:linear-gradient(90deg,#2f67ff,#1f43c9);
      color:#fff;
      border:none;
      width:100%;
      padding:20px;
      border-radius:24px;
      font-size:22px;
      font-weight:700;
      box-shadow:0 12px 25px rgba(47,103,255,.35);
      transition:all .3s ease;
      animation:pulse 2s infinite;
    }

    /* Hover Effect */
    .download-btn:hover{
      transform:translateY(-3px) scale(1.02);
      box-shadow:0 15px 30px rgba(47,103,255,.5);
      background:linear-gradient(90deg,#2559eb,#183ab6);
    }

    /* Click Effect */
    .download-btn:active{
      transform:scale(.96);
    }

    /* Shine Animation */
    .download-btn::before{
      content:'';
      position:absolute;
      top:0;
      left:-80px;
      width:50px;
      height:100%;
      background:rgba(255,255,255,.35);
      transform:skewX(-20deg);
      animation:shine 2.5s infinite;
    }

    /* Pulse Animation */
    @keyframes pulse{
      0%{
        box-shadow:
        0 12px 25px rgba(47,103,255,.35),
        0 0 0 0 rgba(47,103,255,.4);
      }

      70%{
        box-shadow:
        0 12px 25px rgba(47,103,255,.35),
        0 0 0 18px rgba(47,103,255,0);
      }

      100%{
        box-shadow:
        0 12px 25px rgba(47,103,255,.35),
        0 0 0 0 rgba(47,103,255,0);
      }
    }

    /* Shine Move */
    @keyframes shine{
      0%{
        left:-80px;
      }

      100%{
        left:120%;
      }
    }

    /* Feature Cards */
    .feature-card{
      background:#fff;
      border-radius:24px;
      padding:26px 24px;
      text-align:left;
      margin-top:24px;
      box-shadow:0 6px 18px rgba(0,0,0,.04);
    }

    .feature-title{
      font-size:28px;
      font-weight:500;
      margin-bottom:10px;
      color:#111;
    }

    .feature-text{
      color:#666;
      font-size:16px;
    }

    /* Footer Badge */
    .bottom-badge{
      display:inline-block;
      background:#fff;
      padding:12px 24px;
      border-radius:30px;
      margin-top:35px;
      font-weight:600;
      color:#d1146a;
      box-shadow:0 6px 18px rgba(0,0,0,.05);
    }

    /* Responsive */
    @media(max-width:576px){

      .title{
        font-size:30px;
      }

      .download-btn{
        font-size:18px;
        padding:16px;
      }

      .feature-title{
        font-size:22px;
      }

      .feature-text{
        font-size:14px;
      }

      .app-icon-box{
        width:120px;
        height:120px;
      }

    }
